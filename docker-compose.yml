services:
  postgres:
    image: postgres:16
    container_name: capbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: capbase
      POSTGRES_PASSWORD: capbase
      POSTGRES_DB: capbase
    ports:
      # Host 5433 to avoid clashing with a local Postgres on 5432.
      - '5433:5432'
    volumes:
      - capbase-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U capbase -d capbase']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  capbase-pgdata:
